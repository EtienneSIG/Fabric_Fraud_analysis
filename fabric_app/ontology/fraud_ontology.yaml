entities:
  - Customer
  - Account
  - Transaction
  - Device
  - IP
  - Merchant
  - BehaviorSignal
  - FraudCluster
  - Alert
  - Case

relationships:
  - Customer owns Account
  - Account sends Transaction
  - Account receives Transaction
  - Transaction uses Device
  - Transaction uses IP
  - Transaction to Merchant
  - FraudCluster contains Account
  - FraudCluster contains Device
  - FraudCluster contains IP
  - FraudCluster contains Merchant
  - Alert triggered_by Transaction
  - Case investigates Alert

bindings:
  onelake:
    - curated_entities
    - curated_transactions
    - fraud_cases
  eventhouse:
    - Transactions
    - RealtimeFraudFeatures

freshness_strategy:
  live_operations: eventhouse_kql
  semantic_explainability: ontology_graph_refresh
  note: ontology graph may require refresh to reflect upstream changes
